<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>After Tomorrow — Game</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <a class="site-brand" href="index.html" aria-label="After Tomorrow home">
      <img class="site-logo" src="images/melodies of peace.jpg" alt="After Tomorrow logo" />
    </a>
    <a class="site-title" href="index.html">After Tomorrow</a>
    <div class="header-actions">
      <button class="nav-toggle" aria-expanded="false" aria-controls="menu" aria-label="Open navigation menu">☰</button>
      <button id="themeToggle" class="theme-toggle" aria-live="polite" aria-label="Toggle theme">Dark</button>
    </div>
    <nav class="nav" aria-label="Main navigation">
      <ul id="menu" class="menu">
        <li><a href="tickets.html">Tickets</a></li>
        <li><a href="artists.html">Line Up</a></li>
        <li><a href="workshops.html">Workshops</a></li>
        <li><a href="family.html">Family</a></li>
        <li><a href="practical.html">Practical</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li class="cart-link"><a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a></li>
      </ul>
    </nav>
  </header>
  <main class="container game-page">
    <section class="card game-shell">
      <div class="game-copy">
        <h1>Flying For Peace</h1>
        <p>Tap, click, or press Space to keep the bird flying through the pipes.</p>
      </div>
      <div class="game-status" aria-live="polite">
        <p>Score: <span id="score">0</span></p>
        <p id="gameMessage">Press Start to play.</p>
      </div>
      <canvas id="flappyCanvas" width="360" height="540" aria-label="Flappy Bird game area" role="img"></canvas>
      <div class="game-actions">
        <button class="btn btn-primary" id="startGameBtn" type="button">Start</button>
        <button class="btn btn-outline" id="restartGameBtn" type="button">Restart</button>
        <a class="btn btn-outline" href="index.html">Back Home</a>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <p>© <span id="year"></span> After Tomorrow. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
  <script src="game.js"></script>
</body>
</html>
