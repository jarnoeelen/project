<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart — After Tomorrow</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <a class="site-brand" href="index.html" aria-label="After Tomorrow home">
      <img class="site-logo" src="images/melodies of peace.jpg" alt="After Tomorrow logo" />
    </a>
    <a class="site-title" href="index.html">After Tomorrow</a>
    <div class="header-actions">
      <button class="nav-toggle" aria-expanded="false" aria-controls="menu" aria-label="Open navigation menu">☰</button>
      <button id="themeToggle" class="theme-toggle" aria-live="polite" aria-label="Toggle theme">Dark</button>
    </div>
    <nav class="nav" aria-label="Main navigation">
      <ul id="menu" class="menu">
        <li><a href="tickets.html">Tickets</a></li>
        <li><a href="artists.html">Line Up</a></li>
        <li><a href="workshops.html">Workshops</a></li>
        <li><a href="family.html">Family</a></li>
        <li><a href="practical.html">Practical</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li class="active cart-link"><a href="cart.html">Cart <span class="cart-count" id="cartCount">0</span></a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <h1>Your Cart</h1>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-summary card">
      <p><strong>Subtotal:</strong> €<span id="subtotal">0.00</span></p>
      <p><strong>VAT (21%):</strong> €<span id="vat">0.00</span></p>
      <p><strong>Total:</strong> €<span id="total">0.00</span></p>
      <button class="btn btn-primary" id="checkoutBtn">Checkout</button>
      <button class="btn btn-outline" id="clearCartBtn">Clear cart</button>
      <p class="form-success" id="checkoutNotice" hidden>Checkout demo only. Integrate a payment gateway to accept payments.</p>
    </div>
  </main>
  <footer class="site-footer">
    <p>© <span id="year"></span> After Tomorrow.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
